project: rade-gc-radeof-ogbg-densi0.1and1
program: main_gc.py

method: grid
metric:
  name: best/valid_primary
  goal: maximize

parameters:
  dataset:
    values: [ogbg-molhiv]
  gnn:
    values: [gcn]
  aug_tech:
    values: [rade]
  pq_update_unit:
    values: [batch,epoch]
  pq_densification_penalty_lambda:
    values: [0.1,1]

  ep_correction:
    values: [true]
  pq_gradnorm:
    values: [true]
  aug_mode:
    values: [both]
  rade_variant:
    values: [rade-of]
  mask_sharing:
    values: [shared]
  pq_p_max:
    values: [0.9]
#  pq_gat_denom_penalty_lambda:
#    values: [0.0, 0.1, 1.0]
#  pq_gat_denom_cv2_threshold:
#    values: [0.5, 1.0, 2.0]
#  pq_gat_corr_penalty_lambda:
#    values: [0.0, 10.0, 50.0]
#  pq_gat_corr_threshold:
#    values: [1.5, 2.0, 3.0]
#  gat_ep_corr_clip:
#    values: [1.5, 2.0, 3.0]

  device:
    values: [2]

command:
  - ${env}
  - python
  - main_gc.py
  - --wandb
  - --wandb_project
  - rade-gc-radeofs-ogbg
  - ${args}
