project: rade-nc
entity: removed-to-preserve-anonymity

method: grid
metric:
  name: best/valid_acc
  goal: maximize

parameters:
  dataset:
    values: [ogbn-arxiv]
  gnn:
    values: [gcn,gin]
  local_layers:
    values: [2]
  hidden_channels:
    values: [256]
  lr:
    values: [0.001]

  dropout:
    values: [0.0]

  aug_tech: #Dropmessage, Dropnode, RADE
    values: [rade]
  aug_mode:
    values: [both] # only when rade (both, add, drop)
  p:
    values: [0.2,0.5,0.8] #ogbn-arxiv: 0.2, flickr: 0.2
  q:
    values: [0.000013446,0.000033615,0.000053784] #Flickr: 0.0000136, ogbn-arxiv: 0.000013446

  dropmessage_rate:
    values: [0.0]

  dropnode_rate:
    values: [0.0]

  unbiased:
    values: [True]
  pq_gradnorm:
    values: [False]
  mask_sharing:
    values: [layerwise]
  linear:
    values: [False]
  unbiased_mode:
    values: [rade,rade-ic]
  p_max:
    values: [0.8]
  q_max:
    values: [0.000026892]  #Flickr: 0.0000718, ogbn-arxiv: 0.000026892
  pq_grid_size:
    values: [11]
  pq_warmup_epochs:
    values: [20]
#  pq_data_anchor: # TO BE ADDED LATER
#    values: [aug]

  device:
    values: [1]
  runs:
    values: [5]
  epochs:
    values: [2000] # 1000 for flickr
  patience:
    values: [100] # 100 for flickr

command:
  - ${env}
  - python
  - -m
  - RADE_Node_Classification.mini_batch.mb_main
  - --wandb
  - --wandb_project
  - rade-nc
  - ${args}
