project: rade-nc
entity: danial-saber

method: grid
metric:
  name: best/valid_acc
  goal: maximize

parameters:
  dataset:
    values: [cora, citeseer, pubmed]
  gnn:
    values: [gcn, gin]
  local_layers:
    values: [2]
  hidden_channels:
    values: [16,64,128,256,512]
  lr:
    values: [0.0005, 0.001]
  dropout:
    values: [0.0]
  aug_tech:
    values: [none]
  aug_mode:
    values: [none] # only when rade (both, add, drop)
#  unbiased_mode:
#    values: [rade]
#  mask_sharing:
#    values: [shared]
  unbiased:
    values: [false]
  pq_gradnorm:
    values: [false]
#  p:
#    values: [0.2]
#  q:
#    values: [0.0002]

command:
  - ${env}
  - python
  - main.py
  - --wandb
  - --wandb_project
  - rade-nc
  - ${args}
