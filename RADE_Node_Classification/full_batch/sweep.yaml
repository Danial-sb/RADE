project: rade-nc
entity: danial-saber

method: grid
metric:
  name: best/valid_acc
  goal: maximize

parameters:
  dataset:
    values: [cora]
  gnn:
    values: [gcn]
  local_layers:
    values: [3]
  hidden_channels:
    values: [512]
  lr:
    values: [0.001]

  dropout:
    values: [0.0]

  aug_tech: #Dropmessage, Dropnode, RADE
    values: [rade]
  aug_mode:
    values: [both] # only when rade (both, add, drop)
  p:
    values: [0.5]
  q:
    values: [0.000721] #CORA: 0.000721

  dropmessage_rate:
    values: [0.0]

  dropnode_rate:
    values: [0.0]

  unbiased:
    values: [true]
  pq_gradnorm:
    values: [true]
  mask_sharing:
    values: [layerwise]
  linear:
    values: [true]
  unbiased_mode:
    values: [rade]
  p_max:
    values: [0.7]
  q_max:
    values: [0.001442]  #Cora: 0.001442
  pq_grid_size:
    values: [5]
  pq_warmup_epochs:
    values: [20]
  pq_data_anchor:
    values: [aug]

  device:
    values: [0]
  runs:
    values: [5]
  epochs:
    values: [500]
  patience:
    values: [100] # 200 for computer

command:
  - ${env}
  - python
  - main.py
  - --wandb
  - --wandb_project
  - rade-nc
  - ${args}
